<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In-Flight First-Response Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-section {
            margin-bottom: 30px;
        }
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .submit-btn {
            background: #667eea;
            color: white;
            flex: 1;
        }
        .submit-btn:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
        }
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .clear-btn {
            background: #f0f0f0;
            color: #333;
        }
        .clear-btn:hover {
            background: #e0e0e0;
        }
        .output-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }
        .output-section h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .result-card {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .result-card h3 {
            color: #667eea;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .result-card p {
            color: #555;
            font-size: 14px;
            line-height: 1.5;
        }
        .error-card {
            background: #fee;
            border-left-color: #e74c3c;
        }
        .error-card h3 {
            color: #e74c3c;
        }
        .loading {
            color: #667eea;
            font-style: italic;
            font-size: 14px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>In-Flight First-Response Assistant</h1>
        <p class="subtitle">Translate cabin crew ↔ passenger, extract clinical SAMPLE</p>

        <div class="input-section">
            <label for="message">Message (any language):</label>
            <textarea id="message" placeholder="Type a message from the passenger or crew..."></textarea>
            <div class="button-group">
                <button class="submit-btn" id="submitBtn">Translate & Extract</button>
                <button class="clear-btn" id="clearBtn">Clear</button>
            </div>
        </div>

        <div class="output-section hidden" id="outputSection">
            <h2>Results</h2>
            <div id="results"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
